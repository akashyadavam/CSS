<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{ height:400px;
            width:400px;
            background-color: beige;
            border: solid black 5px;
           transition-property: all;
            transition-duration: 4s;
            transition-delay: 1s;
            

        }
        /* koi element jo box class ka uske transistion ke liye hover karna pdta hai */
        .box:hover{
            width: 1200px;
            height: 1200px;
            background-color: brown;
            /* agar transistion property vagera na set kare to bhi trnsistion honga lekin jhatke se honga */
        }
    </style>
</head>
<body>
    <div class="box"></div>

    
</body>
</html>
