<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{margin: 0%;padding: 0%;
        box-sizing: border-box;

    }
        .container{
            height: 100vh;
            width: 100vw;
           
    
            background-color: bisque;
            border: solid black 5px;
        }
          .box{
            width: 350px;
            height: 80px;
            border-radius: 5px ;
            background-color: blue;
            border: 2px solid black;
            margin: 3px;
            padding: 3px;
            position: relative;
            animation-name: akki;
            animation-duration: 4s;
            animation-iteration-count: 1;
            animation-delay: 2s;
            animation-timing-function: linear;
            /* animation-timing-function: cubic-bezier(0, 2.16, 0.72, -0.23); */
            animation-direction: alternate;
             /* animation-fill-mode: forwards;  */
          }
         
         
         #box1{
            
            width: 350px;
            height: 80px;
            border-radius: 5px ;
            background-color: blue;
            border: 2px solid black;
            margin: 3px;
            padding: 3px;
            position: relative;
           
            animation-name: akk;
            animation-duration: 4s;
            animation-iteration-count: 1;
            animation-delay: 2s;
            animation-timing-function: linear;
            /* animation-timing-function: cubic-bezier(0, 2.16, 0.72, -0.23); */
            animation-direction: alternate;
            /* animation-fill-mode: forwards; */

        }
        @keyframes akk{
            from{
                top:700px;
                left: 1300px;
            }
            to{
                top:700px;
                left:0px;
                /* animation ke duran jab end hone wala hota hai to slow ho jata hai; */
                /* left:100vw; */
            }
        }
          @keyframes akki{
            from{
                top:0px;
                left: 0px;
            }
            to{
                top:0px;
                left:1300px;
                /* animation ke duran jab end hone wala hota hai to slow ho jata hai; */
                /* left:100vw; */
            }
        }
         #box2{
            
            width: 100px;
            height: 100px;
            border-radius: 50px ;
            margin: 10px;
            background-color: blue;
            border: 2px solid black;
            position: relative;
            top: 30%;
            left: 30%;
             animation-name: ak;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            animation-delay: 1s;
            animation-timing-function:ease-in;
            animation-direction: alternate-reverse;
            animation-play-state: running;
           
        }
        @keyframes ak  {
            0%{top:1% ;
                left: 5%;
/* ye percent mtlab 30 percent animation jab ho jaye to aese position mein a jaana    */
            }
            30%{top: 5%;
                left:90% ;

            }
            60%{top: 65%;
                left:10% ;

            }
           100% {
top: 70%;
       left:90% ;     }


            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>

    
    <div id="box1"></div>
<div id="box2"></div> </div>
</body>
</html>
